name: Keep Hugging Face Space Awake

on:
  schedule:
    - cron: '0 */12 * * *'  # 每 12 小时自动跑一次（UTC 时间，香港大概早上8点 + 晚上8点）
  workflow_dispatch:       # 允许手动触发测试

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Space URL
        run: |
          curl -s -o /dev/null -w "%{http_code} - Ping successful at $(date)\n" https://huggingface.co/spaces/fangzny/myupdate_gw_app || echo "Ping attempt failed at $(date)"
